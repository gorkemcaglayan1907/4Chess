<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>4CHESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=101">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Turkish Vertical-only Warning -->
    <div id="mobile-vertical-lock">
        <div style="font-size: 3rem; margin-bottom:10px;">📱</div>
        Lütfen Cihazı Dik Tutunuz
        <p style="font-size: 1rem; color: #94a3b8; font-weight: normal; margin-top: 10px;">Bu oyun sadece dikey modda oynanacak şekilde tasarlanmıştır.</p>
    </div>

    <script>
        function enforcePortrait() {
            const lock = document.getElementById('mobile-vertical-lock');
            if (!lock) return;
            const isLandscape = window.innerWidth > window.innerHeight;
            // Lock for mobile-sized screens (up to 1200px landscape)
            if (isLandscape && window.innerWidth < 1200) {
                lock.setAttribute('style', 'display:flex !important;');
                document.body.style.overflow = 'hidden';
            } else {
                lock.setAttribute('style', 'display:none !important;');
                document.body.style.overflow = 'auto';
            }
        }
        window.addEventListener('resize', enforcePortrait);
        window.addEventListener('orientationchange', enforcePortrait);
        window.addEventListener('load', enforcePortrait);
        setInterval(enforcePortrait, 1000); // Fail-safe check
    </script>

    <div id="login-screen">
        <div class="modal-content">
            <h1 style="color:var(--color-blue); margin-bottom:25px; font-size: 2.5rem;">4CHESS</h1>
            
            <input type="text" id="username-input" placeholder="Your Player Name" maxlength="15">
            
            <div id="menu-actions" style="display:flex; flex-direction:column; gap:12px;">
                <button id="btn-quick-play" class="btn-blue">Quick Play</button>
                <div style="display:flex; gap:10px;">
                    <button id="btn-create-room" class="btn-red" style="flex:1;">Create Room</button>
                    <button id="btn-join-room-prompt" class="btn-dark" style="flex:1;">Join Room</button>
                </div>
                <button id="btn-leaderboard" class="btn-gold">🏆 Leaderboard</button>
            </div>
            
            <div id="join-room-container" class="hidden" style="margin-top:20px; padding-top:20px; border-top:1px solid #334155;">
                <input type="text" id="room-code-input" placeholder="CODE" maxlength="4">
                <button id="btn-join-room" class="btn-blue">Connect</button>
            </div>
        </div>
    </div>

    <!-- Matchmaking/Lobby Screen -->
    <div id="lobby-screen" class="hidden">
        <div class="modal-content">
            <h2>Waiting for Players 🔍</h2>
            <div id="queue-status" style="font-size:1.2rem; font-weight:600; color:var(--board-light);">Connecting...</div>
            <div id="timer-status" style="font-size:2rem; font-weight:800; color:var(--color-red); margin-top:10px;"></div>
            <div class="spinner"></div>
            <div id="cancel-queue-container">
                <button id="btn-cancel-queue" class="btn-red" style="margin-top:10px;">Cancel</button>
            </div>
            <p class="small-text" style="color:#64748b; margin-top:20px; font-size:0.85rem;">Bots will take empty seats when time's up.</p>
        </div>
    </div>

    <!-- Match interface -->
    <div id="game-container" class="hidden">
        
        <!-- LARGE TIMER ON THE LEFT -->
        <div id="turn-timer-visual"></div>

        <button id="btn-resign" class="btn-red hidden">🏳️ Resign</button>

        <div id="player-list-container">
            <!-- Populated via JS to match App.js vertical list -->
        </div>

        <div id="your-turn-alert">⚡️ YOUR TURN! ⚡️</div>

        <div id="board-wrapper">
            <div id="chess-board"></div>
        </div>

    <button id="chat-toggle-btn" class="hidden">
        <i class="fas fa-comments"></i>
    </button>

    <div id="chat-widget">
        <div id="chat-header">
            Game Chat
            <span id="chat-close-btn" style="position:absolute; right:15px; cursor:pointer; font-size:1.2rem; display:none;">✕</span>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." maxlength="60">
            <button id="btn-send-chat"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>


    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="hidden">
        <div class="modal-content">
            <h2 style="color: #eab308; margin-bottom: 20px;">🏆 Leaderboard</h2>
            <div id="leaderboard-list" style="max-height: 300px; overflow-y: auto; text-align: left; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px solid #334155;">
                Loading...
            </div>
            <button id="btn-close-leaderboard" class="btn-dark" style="margin-top: 15px;">Close</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="audio.js?v=101"></script>
    <script src="engine.js?v=101"></script>
    <script src="ui.js?v=101"></script>
</body>
</html>
