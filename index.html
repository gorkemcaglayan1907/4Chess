<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>4CHESS â€“ 4-Player Chess</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
    #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

    /* â”€â”€â”€ SCREENS â”€â”€â”€ */
    .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 24px; }
    .screen.active { display: flex; }

    /* â”€â”€â”€ ONBOARDING â”€â”€â”€ */
    .logo { font-size: 52px; font-weight: 900; color: #3b82f6; letter-spacing: 8px; margin-bottom: 6px; }
    .subtitle { font-size: 15px; color: #64748b; margin-bottom: 48px; }
    .field-label { align-self: flex-start; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    input[type=text] {
      width: 100%; max-width: 360px;
      background: #1e293b; color: #fff;
      border: 1.5px solid #334155; border-radius: 12px;
      padding: 14px 16px; font-size: 17px;
      outline: none; transition: border-color .2s;
    }
    input[type=text]:focus { border-color: #3b82f6; }
    input[type=text]::placeholder { color: #475569; }

    .btn {
      width: 100%; max-width: 360px;
      padding: 15px; border-radius: 12px;
      border: none; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .1s;
      margin-top: 10px; color: #fff;
    }
    .btn:active { transform: scale(0.98); }
    .btn-blue  { background: #2563eb; }
    .btn-red   { background: #dc2626; }
    .btn-dark  { background: #1e293b; border: 1.5px solid #334155; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* â”€â”€â”€ LOBBY â”€â”€â”€ */
    .status-dot { position: fixed; top: 20px; right: 20px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #94a3b8; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    .dot.online { background: #22c55e; }

    .profile-chip {
      display: flex; align-items: center; gap: 8px;
      background: #1e293b; border: 1.5px solid #334155;
      padding: 10px 20px; border-radius: 25px;
      margin-bottom: 28px;
    }
    .profile-chip span { font-size: 16px; font-weight: 700; color: #e2e8f0; }

    .join-section { width: 100%; max-width: 360px; margin-top: 14px; padding-top: 14px; border-top: 1px solid #334155; }
    .code-input {
      width: 100%; background: #1e293b; color: #fff;
      border: 1.5px solid #334155; border-radius: 12px;
      padding: 14px; font-size: 22px; font-weight: 600;
      text-align: center; letter-spacing: 10px;
      text-transform: uppercase; outline: none;
    }
    .code-input:focus { border-color: #3b82f6; }

    /* â”€â”€â”€ MATCHMAKING â”€â”€â”€ */
    .queue-text { font-size: 18px; color: #94a3b8; text-align: center; margin-top: 16px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .room-code-display { font-size: 36px; font-weight: 900; color: #22c55e; letter-spacing: 10px; margin: 16px 0; }
    .waiting-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; width: 100%; max-width: 300px; }
    .waiting-player { background: #1e293b; padding: 12px 16px; border-radius: 10px; font-size: 14px; color: #e2e8f0; border: 1px solid #334155; }

    /* â”€â”€â”€ GAME â”€â”€â”€ */
    #game-screen { padding: 4px; }
    .game-top { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 4px 8px; }
    .game-timer { font-size: 15px; color: #fbbf24; }
    .resign-btn { background: #7f1d1d; border: none; color: #fca5a5; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    #board-wrap { position: relative; margin: 4px auto; }
    #board { display: grid; position: relative; }
    .cell {
      position: relative; display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; transition: background .1s;
    }
    .cell.light { background: #F0D9B5; }
    .cell.dark  { background: #B58863; }
    .cell.dead  { background: transparent; }
    .cell.selected { background: rgba(16,185,129,.55) !important; }
    .cell.last-move { background: rgba(234,179,8,.55) !important; }
    .cell.hint::after {
      content: ''; position: absolute;
      width: 30%; height: 30%; border-radius: 50%;
      background: rgba(0,0,0,.25);
    }
    .cell.hint-capture::after {
      content: ''; position: absolute; inset: 3px;
      border-radius: 50%; border: 4px solid rgba(0,0,0,.18);
    }
    .piece {
      display: flex; align-items: center; justify-content: center;
      width: 82%; height: 82%; border-radius: 50%;
      font-size: 55%; font-weight: 900; color: #fff;
      z-index: 1; user-select: none;
      transform-origin: center center;
    }
    .piece.white  { background: #16a34a; box-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .piece.black  { background: #475569; box-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .piece.blue   { background: #2563eb; box-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .piece.red    { background: #dc2626; box-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .piece.elim   { background: #334155; opacity: .45; }
    .piece .plabel { font-size: 100%; font-weight: 900; line-height: 1; }

    /* HUD */
    .hud { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 4px 8px; gap: 6px; }
    .hud-slot {
      flex: 1; padding: 5px 8px; border-radius: 8px;
      background: rgba(15,23,42,.9); border: 1.5px solid rgba(255,255,255,.1);
      font-size: 11px; font-weight: 700; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: border-color .2s, box-shadow .2s;
    }
    .hud-slot.active-turn { box-shadow: 0 0 8px 2px currentColor; }

    /* Game Over Overlay */
    .game-over-overlay {
      position: fixed; inset: 0; background: rgba(2,6,23,.92);
      display: none; flex-direction: column; align-items: center;
      justify-content: center; z-index: 100; gap: 12px;
    }
    .game-over-overlay.show { display: flex; }
    .game-over-title { font-size: 40px; font-weight: 900; color: #fbbf24; }
    .winner-text { font-size: 22px; color: #fff; }

    /* Chat */
    #chat-btn { position: fixed; bottom: 16px; right: 16px; background: #1e293b; border: 1.5px solid #334155; color: #fff; width: 48px; height: 48px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #chat-btn .badge { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; position: absolute; top: 6px; right: 6px; }
    #chat-panel { position: fixed; bottom: 72px; right: 12px; width: 300px; max-height: 380px; background: #0f172a; border: 1px solid #334155; border-radius: 16px; display: none; flex-direction: column; overflow: hidden; }
    #chat-panel.open { display: flex; }
    #chat-header { padding: 12px 16px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
    #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .chat-msg { font-size: 12px; }
    .chat-msg .name { font-weight: 700; }
    #chat-input-row { display: flex; padding: 8px; gap: 6px; border-top: 1px solid #1e293b; }
    #chat-input { flex: 1; background: #1e293b; border: none; color: #fff; padding: 8px; border-radius: 8px; outline: none; font-size: 13px; }
    #chat-send { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-weight: 700; }

    @media (max-width: 480px) { .logo { font-size: 40px; } }
  </style>
</head>
<body>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// CONSTANTS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const SERVER_URL = 'https://fourchess.onrender.com';
const COLORS = ['white','black','blue','red'];
const UNICODE = { king:'â™š', queen:'â™›', rook:'â™œ', bishop:'â™', knight:'â™', pawn:'â™Ÿ' };
const COLOR_HEX = { white:'#22c55e', black:'#94a3b8', blue:'#3b82f6', red:'#ef4444' };

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// STATE
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let socket = null;
let sessionId = null;
let username = '';
let myColor = null;
let game = null;           // { board, turnIndex, activePlayers, gameOver, winner, lastMove }
let playerNames = {};
let selCell = null;
let validMoves = [];
let turnEndTime = 0;
let timerInterval = null;
let chatOpen = false;
let hasUnread = false;
let joining = false;
let myRoomCode = null;
let boardRotation = 0;    // degrees: 0=white, 90=red, 180=black, 270=blue
let cellSize = 30;

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// SESSION
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function loadOrCreateSession() {
  let id = localStorage.getItem('4chess_session');
  if (!id) { id = Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('4chess_session', id); }
  return id;
}
function newSession() {
  const id = Math.random().toString(36).slice(2) + Date.now().toString(36);
  localStorage.setItem('4chess_session', id);
  return id;
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// SOCKET
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function connectSocket() {
  if (socket) { socket.disconnect(); }
  socket = io(SERVER_URL, {
    query: { sessionId },
    transports: ['polling', 'websocket'],
    reconnection: true,
    reconnectionDelay: 1000,
  });
  socket.on('connect', () => setConnected(true));
  socket.on('disconnect', () => setConnected(false));
  socket.on('match_found', (d) => { myColor = d.color; boardRotation = {white:0,black:180,blue:270,red:90}[myColor] || 0; });
  socket.on('init_state', (d) => { syncState(d); playerNames = d.playerNames || {}; showScreen('game-screen'); renderBoard(); updateHUD(); });
  socket.on('state_update', (d) => { syncState(d); renderBoard(); updateHUD(); updateTimer(); });
  socket.on('queue_update', (d) => { document.getElementById('queue-text').textContent = `Players: ${d.count}/4  (${d.secondsLeft}s)`; });
  socket.on('custom_room_joined', (d) => {
    myRoomCode = d.code;
    document.getElementById('room-code-shown').textContent = d.code;
    document.getElementById('room-code-shown').style.display = 'block';
    document.getElementById('queue-text').textContent = `Room ${d.code} â€“ Waiting...`;
    const wl = document.getElementById('waiting-list');
    wl.innerHTML = d.names.map(n => `<div class="waiting-player">ğŸ‘¤ ${n}</div>`).join('');
  });
  socket.on('room_error', (msg) => { alert(msg); showScreen('lobby-screen'); });
  socket.on('force_lobby', () => performLobbyExit());
  socket.on('chat_msg', (d) => addChatMsg(d));
}

function setConnected(val) {
  document.getElementById('conn-dot').className = 'dot' + (val ? ' online' : '');
  document.getElementById('conn-label').textContent = val ? 'ONLINE' : 'OFFLINE';
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// SCREENS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const isGame = id === 'game-screen';
  document.getElementById('chat-btn').style.display = isGame ? 'flex' : 'none';
  document.getElementById('game-over').classList.remove('show');
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// STATE SYNC
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function syncState(d) {
  game = d;
  selCell = null; validMoves = [];
  if (d.turnEndTime) turnEndTime = d.turnEndTime - (d.serverTime ? d.serverTime - Date.now() : 0);
  if (d.playerNames) playerNames = d.playerNames;
  if (d.gameOver) { showGameOver(); }
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// BOARD
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function inBounds(x, y) {
  if (x < 3 && y < 3) return false;
  if (x > 10 && y < 3) return false;
  if (x < 3 && y > 10) return false;
  if (x > 10 && y > 10) return false;
  return x >= 0 && x <= 13 && y >= 0 && y <= 13;
}

function computeCellSize() {
  const maxDim = Math.min(window.innerWidth, window.innerHeight) - 80;
  cellSize = Math.floor(maxDim / 14);
}

const PIECE_LABEL = { king:'K', queen:'Q', rook:'R', bishop:'B', knight:'N', pawn:'P' };

function renderBoard() {
  if (!game) return;
  computeCellSize();
  const board = document.getElementById('board');
  board.style.width  = (cellSize * 14) + 'px';
  board.style.height = (cellSize * 14) + 'px';
  board.style.gridTemplateColumns = `repeat(14, ${cellSize}px)`;
  board.style.fontSize = cellSize + 'px';
  board.style.transform = `rotate(${boardRotation}deg)`;
  board.innerHTML = '';

  for (let y = 0; y < 14; y++) {
    for (let x = 0; x < 14; x++) {
      const cell = document.createElement('div');
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';

      if (!inBounds(x, y)) {
        cell.className = 'cell dead';
      } else {
        const isLight = (x + y) % 2 === 0;
        let cls = 'cell ' + (isLight ? 'light' : 'dark');
        const isSelected = selCell && selCell.x === x && selCell.y === y;
        const isLast = game.lastMove && ((game.lastMove.fx===x&&game.lastMove.fy===y)||(game.lastMove.tx===x&&game.lastMove.ty===y));
        const isHint = validMoves.some(m => m.x===x && m.y===y);
        const cellPiece = game.board?.[y]?.[x]?.piece;

        if (isSelected) cls += ' selected';
        else if (isLast) cls += ' last-move';
        if (isHint) cls += cellPiece ? ' hint-capture' : ' hint';
        cell.className = cls;

        if (cellPiece) {
          const active = game.activePlayers?.[cellPiece.color] !== false;
          const badge = document.createElement('div');
          badge.className = 'piece ' + (active ? cellPiece.color : 'elim');
          badge.style.transform = `rotate(${-boardRotation}deg)`;
          const lbl = document.createElement('span');
          lbl.className = 'plabel';
          lbl.textContent = PIECE_LABEL[cellPiece.type] || '?';
          badge.appendChild(lbl);
          cell.appendChild(badge);
        }
        cell.addEventListener('click', () => handleCellClick(x, y));
      }
      board.appendChild(cell);
    }
  }
}

function handleCellClick(x, y) {
  if (!game || game.gameOver || !myColor) return;
  const curColor = COLORS[game.turnIndex];
  if (curColor !== myColor) return;
  const cellPiece = game.board?.[y]?.[x]?.piece;

  if (selCell) {
    const mv = validMoves.find(m => m.x === x && m.y === y);
    if (mv) {
      socket.emit('make_move', { fx: selCell.x, fy: selCell.y, tx: x, ty: y });
      selCell = null; validMoves = []; renderBoard();
      return;
    }
  }
  if (cellPiece && cellPiece.color === myColor) {
    selCell = { x, y };
    // Request valid moves from local engine would be ideal, but for web we just select and wait
    // For now, highlight selection only â€” moves confirmed by server
    validMoves = [];  // server validates on move
    renderBoard();
    // Re-highlight selection
    const idx = y * 14 + x;
    const cells = document.getElementById('board').children;
    if (cells[idx]) cells[idx].classList.add('selected');
  } else {
    selCell = null; validMoves = []; renderBoard();
  }
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// HUD
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function updateHUD() {
  if (!game) return;
  // Based on myColor perspective: bottom=me, top=opposite, left/right=others
  const slotMap = {
    white: ['white','black','blue','red'],
    black: ['black','white','red','blue'],
    blue:  ['blue','red','black','white'],
    red:   ['red','blue','white','black'],
  };
  const slots = slotMap[myColor] || ['white','black','blue','red'];
  const topSlots = [slots[2], slots[3]];   // sides shown on top
  const botSlots = [slots[1], slots[0]];   // [opposite, me]

  function makeSlot(color) {
    const name = playerNames[color] || color;
    const active = game.activePlayers?.[color] !== false;
    const isTurn = COLORS[game.turnIndex] === color && !game.gameOver;
    const hex = COLOR_HEX[color] || '#fff';
    const div = document.createElement('div');
    div.className = 'hud-slot' + (isTurn ? ' active-turn' : '');
    div.style.color = hex;
    div.style.borderColor = isTurn ? hex : 'rgba(255,255,255,.1)';
    if (isTurn) div.style.setProperty('--tw-shadow-color', hex);
    div.innerHTML = name.toUpperCase() + (active ? '' : ' <span style="color:#ef4444;font-size:9px;">OUT</span>');
    return div;
  }

  const hudTop = document.getElementById('hud-top');
  const hudBot = document.getElementById('hud-bottom');
  hudTop.innerHTML = ''; hudBot.innerHTML = '';
  topSlots.forEach(c => hudTop.appendChild(makeSlot(c)));
  botSlots.forEach(c => hudBot.appendChild(makeSlot(c)));
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// TIMER
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function updateTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const left = Math.max(0, Math.ceil((turnEndTime - Date.now()) / 1000));
    document.getElementById('timer-display').textContent = 'â³ ' + left + 's';
    if (left <= 0) clearInterval(timerInterval);
  }, 500);
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// GAME OVER
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function showGameOver() {
  const winner = game?.winner;
  document.getElementById('winner-text').textContent = 'Winner: ' + (playerNames[winner] || winner || 'No one');
  document.getElementById('game-over').classList.add('show');
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// LOBBY EXIT
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function performLobbyExit() {
  game = null; myColor = null; selCell = null; validMoves = [];
  playerNames = {}; turnEndTime = 0; myRoomCode = null;
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('chat-msgs').innerHTML = '';
  document.getElementById('chat-panel').classList.remove('open');
  chatOpen = false; hasUnread = false;
  document.getElementById('chat-badge').style.display = 'none';
  document.getElementById('game-over').classList.remove('show');
  // New session so server doesn't re-bind
  sessionId = newSession();
  connectSocket();
  document.getElementById('profile-name').textContent = username;
  showScreen('lobby-screen');
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// CHAT
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function addChatMsg(d) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  const nameSpan = document.createElement('span');
  nameSpan.className = 'name';
  nameSpan.style.color = COLOR_HEX[d.color] || '#94a3b8';
  nameSpan.textContent = (d.name || 'System') + ': ';
  div.appendChild(nameSpan);
  div.appendChild(document.createTextNode(d.text || ''));
  document.getElementById('chat-msgs').appendChild(div);
  document.getElementById('chat-msgs').scrollTop = 99999;
  if (!chatOpen) { hasUnread = true; document.getElementById('chat-badge').style.display = 'block'; }
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// INIT
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
window.addEventListener('DOMContentLoaded', () => {
  // Load saved username
  const saved = localStorage.getItem('4chess_username');
  const usernameInput = document.getElementById('username-input');
  const startBtn = document.getElementById('start-btn');
  if (saved) { usernameInput.value = saved; startBtn.disabled = false; }
  usernameInput.addEventListener('input', () => { startBtn.disabled = !usernameInput.value.trim(); });
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && usernameInput.value.trim()) startGame(); });

  startBtn.addEventListener('click', startGame);

  function startGame() {
    username = usernameInput.value.trim();
    if (!username) return;
    localStorage.setItem('4chess_username', username);
    document.getElementById('profile-name').textContent = username;
    sessionId = loadOrCreateSession();
    connectSocket();
    showScreen('lobby-screen');
  }

  // Lobby buttons
  document.getElementById('quick-play-btn').addEventListener('click', () => {
    socket.emit('join_queue', { username, name: username, flag: 'us' });
    document.getElementById('queue-text').textContent = 'Searching for players...';
    document.getElementById('room-code-shown').style.display = 'none';
    document.getElementById('waiting-list').innerHTML = '';
    showScreen('matchmaking-screen');
  });

  document.getElementById('create-btn').addEventListener('click', () => {
    socket.emit('create_room', { name: username, flag: 'us' });
    document.getElementById('queue-text').textContent = 'Creating room...';
    document.getElementById('room-code-shown').style.display = 'none';
    document.getElementById('waiting-list').innerHTML = '';
    showScreen('matchmaking-screen');
  });

  document.getElementById('join-toggle-btn').addEventListener('click', () => {
    joining = !joining;
    document.getElementById('join-section').style.display = joining ? 'block' : 'none';
  });

  document.getElementById('join-btn').addEventListener('click', () => {
    const code = document.getElementById('room-code-input').value.toUpperCase().trim();
    if (!code) return;
    socket.emit('join_room', { name: username, flag: 'us', code });
    document.getElementById('queue-text').textContent = 'Joining room ' + code + '...';
    document.getElementById('room-code-shown').style.display = 'none';
    document.getElementById('waiting-list').innerHTML = '';
    showScreen('matchmaking-screen');
  });

  document.getElementById('cancel-btn').addEventListener('click', () => performLobbyExit());
  document.getElementById('resign-btn').addEventListener('click', () => {
    if (confirm('AI will take over your turn. Resign?')) {
      socket.emit('resign');
      performLobbyExit();
    }
  });
  document.getElementById('return-lobby-btn').addEventListener('click', () => performLobbyExit());

  // Chat
  document.getElementById('chat-btn').style.display = 'none';
  document.getElementById('chat-btn').addEventListener('click', () => {
    chatOpen = !chatOpen;
    document.getElementById('chat-panel').classList.toggle('open', chatOpen);
    if (chatOpen) { hasUnread = false; document.getElementById('chat-badge').style.display = 'none'; }
  });
  document.getElementById('chat-close').addEventListener('click', () => {
    chatOpen = false; document.getElementById('chat-panel').classList.remove('open');
  });
  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
  function sendChat() {
    const t = document.getElementById('chat-input').value.trim();
    if (t && socket) { socket.emit('chat_msg', { text: t }); document.getElementById('chat-input').value = ''; }
  }

  // Responsive board
  window.addEventListener('resize', () => { if (game) renderBoard(); });
});
</script>
